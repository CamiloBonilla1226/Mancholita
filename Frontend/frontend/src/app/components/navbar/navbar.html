<div class="header-sticky" [class.hidden]="!isVisible">

  <header class="navbar">

    <div class="logo">
      MANCHOLITA
    </div>

    <div class="main-menu">
      <button (click)="filterByGender(1)">HOMBRE</button>
      <button (click)="filterByGender(2)">MUJER</button>
    </div>

    <div class="search">
      <input
        type="text"
        placeholder="Buscar productos..."
        [(ngModel)]="searchText"
        (input)="onSearchChange()">
    </div>

    <div class="cart" [class.bump]="cartBump" (click)="openCart()">
      🛒 <span class="count" [class.bump]="cartBump">{{ cartCount }}</span>
    </div>

  </header>

  <div class="subfilters" *ngIf="subcategories.length > 0">
    <button
      *ngFor="let sub of subcategories"
      (click)="filterByCategory(sub.id)">
      {{ sub.name }}
    </button>
  </div>

</div>
