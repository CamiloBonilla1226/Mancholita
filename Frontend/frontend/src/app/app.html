<app-navbar
  (cartClicked)="toggleCart()"
  (searchChanged)="onSearchChanged($event)">
</app-navbar>

<app-cart-panel *ngIf="cartOpen" (checkoutClicked)="openCheckout()"></app-cart-panel>

<app-checkout *ngIf="showCheckout"></app-checkout>

<app-catalog *ngIf="!showCheckout" [searchText]="searchText"></app-catalog>
