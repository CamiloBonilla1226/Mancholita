<app-navbar
  [currentGender]="selectedGender"
  [currentCategory]="selectedCategory"
  [hideSubcategories]="showCheckout"
  (cartClicked)="toggleCart()"
  (searchChanged)="onSearchChanged($event)"
  (genderChanged)="onGenderChanged($event)"
  (categoryChanged)="onCategoryChanged($event)"
  (logoClicked)="goToAbout()">
</app-navbar>

<div class="social-bar" *ngIf="(showAbout || (!showAbout && !showCheckout && !cartOpen && !productModalOpen))">
  <a class="social-link" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
    <span class="social-icon social-icon-instagram" aria-hidden="true"></span>
  </a>
  <a class="social-link" href="https://www.facebook.com" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
    <span class="social-icon social-icon-facebook" aria-hidden="true"></span>
  </a>
  <a class="social-link" href="https://www.tiktok.com" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
    <span class="social-icon social-icon-tiktok" aria-hidden="true"></span>
  </a>
</div>

<app-cart-panel
  *ngIf="cartOpen"
  (closePanel)="closeCart()"
  (checkoutClicked)="openCheckout()">
</app-cart-panel>

<app-checkout
  *ngIf="showCheckout"
  (orderCompleted)="showCheckout = false">
</app-checkout>

<app-about
  *ngIf="showAbout && !showCheckout"
  (viewMoreClicked)="goToProductCatalog($event)">
</app-about>

<app-catalog
  *ngIf="!showAbout && !showCheckout"
  [searchText]="searchText"
  [selectedGender]="selectedGender"
  [selectedCategory]="selectedCategory">
</app-catalog>

<app-footer></app-footer>
