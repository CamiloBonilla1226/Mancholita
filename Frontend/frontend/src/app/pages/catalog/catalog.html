<h1>Catálogo Mancholita</h1>
<div class="catalog">

  <div class="product" *ngFor="let p of paginatedProducts">

    <img [src]="p.imageUrl">

    <h3>{{p.name}}</h3>

    <p>{{p.description}}</p>

    <h2>{{ p.price | currency:'COP':'symbol':'1.0-0' }}</h2>


    <button (click)="addToCart(p)">
Agregar al carrito
</button>

  </div>

</div>

<div class="pagination" *ngIf="totalPages > 1">
  <button (click)="prevPage()" [disabled]="currentPage === 1">
    Anterior
  </button>

  <span>Página {{ currentPage }} de {{ totalPages }}</span>

  <button (click)="nextPage()" [disabled]="currentPage === totalPages">
    Siguiente
  </button>
</div>
