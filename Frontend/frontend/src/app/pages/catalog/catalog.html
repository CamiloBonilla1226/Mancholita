<h1>Catálogo Mancholita</h1>
<p>Total productos: {{ products.length }}</p>

<div class="catalog">

  <div class="product" *ngFor="let p of products">

    <img [src]="p.imageUrl">

    <h3>{{p.name}}</h3>

    <p>{{p.description}}</p>

    <h2>{{ p.price | currency:'COP':'symbol':'1.0-0' }}</h2>


    <button (click)="addToCart(p)">
Agregar al carrito
</button>

  </div>

</div>
