<div class="checkout">

  <h1>Finalizar pedido</h1>

  <form (ngSubmit)="submitOrder()">

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" placeholder="Tu nombre" [(ngModel)]="customerName" name="customerName">
    </div>

    <div class="form-group">
      <label>Teléfono</label>
      <input type="text" placeholder="Número de contacto" [(ngModel)]="phone" name="phone">
    </div>

    <div class="form-group">
      <label>Correo</label>
      <input type="email" placeholder="correo@email.com" [(ngModel)]="email" name="email">
    </div>

    <div class="form-group">
      <label>Identificación</label>
      <input type="text" placeholder="Cédula o documento" [(ngModel)]="documentNumber" name="documentNumber">
    </div>

    <div class="form-group">
      <label>Dirección</label>
      <input type="text" placeholder="Dirección de entrega" [(ngModel)]="address" name="address">
    </div>

    <div class="form-group">
      <label>Departamento</label>
      <input type="text" placeholder="Ej: Cauca" [(ngModel)]="department" name="department">
    </div>

    <div class="form-group">
      <label>Ciudad</label>
      <input type="text" placeholder="Ej: Popayán" [(ngModel)]="municipality" name="municipality">
    </div>

    <div *ngIf="errorMessage" class="checkout-error">
      {{ errorMessage }}
    </div>

    <button
      type="submit"
      class="checkout-button">
      Enviar pedido por WhatsApp
    </button>

  </form>

</div>
